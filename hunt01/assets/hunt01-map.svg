<g><rect class="corridorShell" x="1680" y="175" width="110" height="110" rx="16"/><rect class="corridorFloor" x="1690" y="190" width="90" height="80"/></g>
<g id="power-relay-room"><rect class="shell" x="1755" y="105" width="470" height="315" rx="38"/><rect class="floor hot" x="1780" y="135" width="420" height="260" rx="22"/><rect class="grid" x="1780" y="135" width="420" height="260" rx="22"/><rect class="machine" x="1900" y="205" width="115" height="100" rx="18"/><circle class="blue" cx="2100" cy="265" r="13"/></g>

<g><rect class="corridorShell" x="235" y="305" width="120" height="170" rx="16"/><rect class="corridorFloor" x="250" y="315" width="90" height="150"/></g>
