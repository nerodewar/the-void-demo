<g><rect class="corridorShell" x="790" y="365" width="120" height="110" rx="16"/><rect class="corridorFloor" x="805" y="375" width="95" height="90"/></g>

<g id="maintenance-tunnel"><rect class="shell" x="875" y="380" width="370" height="525" rx="36"/><rect class="floor" x="900" y="405" width="320" height="475" rx="20"/><rect class="grid" x="900" y="405" width="320" height="475" rx="20"/><rect x="930" y="445" width="260" height="14" fill="url(#hazard)"/><rect x="930" y="825" width="260" height="14" fill="url(#hazard)"/></g>
