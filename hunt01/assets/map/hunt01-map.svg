<svg xmlns="http://www.w3.org/2000/svg" width="3000" height="2200" viewBox="0 0 3000 2200">
<defs>
  <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1"><stop stop-color="#071018"/><stop offset="1" stop-color="#010407"/></linearGradient>
  <linearGradient id="floor" x1="0" y1="0" x2="0" y2="1"><stop stop-color="#3d4a54"/><stop offset=".55" stop-color="#252f37"/><stop offset="1" stop-color="#12191f"/></linearGradient>
  <linearGradient id="hot" x1="0" y1="0" x2="0" y2="1"><stop stop-color="#493b31"/><stop offset="1" stop-color="#181717"/></linearGradient>
  <linearGradient id="cool" x1="0" y1="0" x2="1" y2="1"><stop stop-color="#194456"/><stop offset="1" stop-color="#0b232e"/></linearGradient>
  <linearGradient id="silver" x1="0" y1="0" x2="1" y2="1"><stop stop-color="#f5f8fa"/><stop offset=".18" stop-color="#9ba8b0"/><stop offset=".48" stop-color="#e2e8eb"/><stop offset=".78" stop-color="#6f7d86"/><stop offset="1" stop-color="#cad3d8"/></linearGradient>
  <pattern id="grid" width="48" height="48" patternUnits="userSpaceOnUse"><rect width="48" height="48" fill="none" stroke="#d6e0e6" stroke-opacity=".16"/><circle cx="7" cy="7" r="2.2" fill="#e7edf0" opacity=".16"/></pattern>
  <pattern id="grate" width="28" height="28" patternUnits="userSpaceOnUse"><rect width="28" height="28" fill="#121a20"/><path d="M0 0L28 28M28 0L0 28" stroke="#788892" stroke-width="2" opacity=".42"/></pattern>
  <pattern id="hazard" width="40" height="40" patternUnits="userSpaceOnUse" patternTransform="rotate(45)"><rect width="20" height="40" fill="#c67b25"/><rect x="20" width="20" height="40" fill="#12171b"/></pattern>
  <filter id="shadow"><feDropShadow dx="0" dy="14" stdDeviation="16" flood-color="#000" flood-opacity=".85"/></filter>
  <filter id="glow"><feGaussianBlur stdDeviation="8" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
  <style>
    .shell{fill:url(#silver);stroke:#334149;stroke-width:9;filter:url(#shadow)}
    .floor{fill:url(#floor);stroke:#202b33;stroke-width:4}.floor.hot{fill:url(#hot)}.floor.cool{fill:url(#cool)}
    .grid{fill:url(#grid)}.corridorShell{fill:url(#silver);stroke:#334149;stroke-width:8;filter:url(#shadow)}.corridorFloor{fill:url(#grate)}
    .machine{fill:#151d23;stroke:#788892;stroke-width:8}.panel{fill:#071119;stroke:#6c7d87;stroke-width:6}
    .blue{fill:#31c2ff;filter:url(#glow)}.red{fill:#ff452f;filter:url(#glow)}.amber{fill:#ffb13f;filter:url(#glow)}
  </style>
</defs>
<rect width="3000" height="2200" fill="url(#bg)"/>

<!-- Upper deck. Long connectors make the route readable and prevent room shells from stacking. -->
<g id="control-corridor"><rect class="shell" x="110" y="110" width="680" height="260" rx="40"/><rect class="floor" x="140" y="140" width="620" height="200" rx="24"/><rect class="grid" x="140" y="140" width="620" height="200" rx="24"/></g>
<g><rect class="corridorShell" x="750" y="175" width="240" height="130" rx="18"/><rect class="corridorFloor" x="760" y="195" width="220" height="90" rx="8"/></g>
<g id="emergency-junction"><path class="shell" d="M1040 90H1280L1370 180V390L1280 480H1040L950 390V180Z"/><path class="floor" d="M1070 120H1250L1340 210V360L1250 450H1070L980 360V210Z"/><path class="grid" d="M1070 120H1250L1340 210V360L1250 450H1070L980 360V210Z"/></g>
<g><rect class="corridorShell" x="1330" y="175" width="220" height="130" rx="18"/><rect class="corridorFloor" x="1340" y="195" width="200" height="90" rx="8"/></g>
<g id="maintenance-hall"><rect class="shell" x="1510" y="110" width="680" height="260" rx="40"/><rect class="floor" x="1540" y="140" width="620" height="200" rx="24"/><rect class="grid" x="1540" y="140" width="620" height="200" rx="24"/></g>
<g><rect class="corridorShell" x="2150" y="175" width="220" height="130" rx="18"/><rect class="corridorFloor" x="2160" y="195" width="200" height="90" rx="8"/></g>
<g id="power-relay-room"><rect class="shell" x="2330" y="80" width="540" height="360" rx="44"/><rect class="floor hot" x="2360" y="110" width="480" height="300" rx="26"/><rect class="grid" x="2360" y="110" width="480" height="300" rx="26"/><rect class="machine" x="2500" y="205" width="125" height="105" rx="20"/><circle class="blue" cx="2730" cy="260" r="15"/></g>

<!-- Separated utility rooms. -->
<g><rect class="corridorShell" x="250" y="330" width="180" height="290" rx="20"/><rect class="corridorFloor" x="270" y="340" width="140" height="260"/></g>
<g id="coolant-access"><rect class="shell" x="90" y="570" width="490" height="360" rx="44"/><rect class="floor cool" x="120" y="600" width="430" height="300" rx="26"/><rect class="grid" x="120" y="600" width="430" height="300" rx="26"/><path d="M185 640V860M280 625V875M485 625V875" fill="none" stroke="#5c7380" stroke-width="18"/><circle class="blue" cx="190" cy="850" r="13"/></g>
<g><rect class="corridorShell" x="540" y="715" width="120" height="160" rx="18"/><rect class="corridorFloor" x="550" y="735" width="100" height="120"/></g>
<g id="storage-room"><rect class="shell" x="620" y="620" width="460" height="360" rx="44"/><rect class="floor" x="650" y="650" width="400" height="300" rx="26"/><rect class="grid" x="650" y="650" width="400" height="300" rx="26"/><rect class="machine" x="720" y="740" width="110" height="100" rx="18"/><rect class="panel" x="885" y="755" width="95" height="120" rx="16"/><rect class="blue" x="905" y="780" width="55" height="54" rx="9"/></g>
<g><rect class="corridorShell" x="1040" y="715" width="180" height="160" rx="18"/><rect class="corridorFloor" x="1050" y="735" width="150" height="120"/></g>

<!-- Central spine with generous spacing and clean, full-width doorways. -->
<g><rect class="corridorShell" x="1070" y="430" width="180" height="290" rx="20"/><rect class="corridorFloor" x="1090" y="450" width="140" height="250"/></g>
<g id="maintenance-tunnel"><rect class="shell" x="970" y="670" width="560" height="710" rx="44"/><rect class="floor" x="1000" y="700" width="500" height="650" rx="26"/><rect class="grid" x="1000" y="700" width="500" height="650" rx="26"/><rect x="1040" y="750" width="420" height="16" fill="url(#hazard)"/><rect x="1040" y="1285" width="420" height="16" fill="url(#hazard)"/></g>
<g><rect class="corridorShell" x="1130" y="1330" width="240" height="190" rx="20"/><rect class="corridorFloor" x="1150" y="1350" width="200" height="150"/></g>
<g id="engine-room"><rect class="shell" x="970" y="1470" width="560" height="480" rx="44"/><rect class="floor hot" x="1000" y="1500" width="500" height="420" rx="26"/><rect class="grid" x="1000" y="1500" width="500" height="420" rx="26"/><rect class="machine" x="1180" y="1625" width="140" height="135" rx="30"/><circle class="amber" cx="1250" cy="1692" r="27"/><rect class="panel" x="1195" y="1810" width="110" height="65" rx="11"/></g>

<!-- Wide access corridors and isolated thruster chambers. -->
<g id="port-engine-access"><rect class="corridorShell" x="400" y="1570" width="600" height="300" rx="34"/><rect class="corridorFloor" x="430" y="1600" width="570" height="240" rx="16"/><rect x="490" y="1640" width="400" height="18" fill="url(#hazard)"/></g>
<g id="starboard-engine-access"><rect class="corridorShell" x="1500" y="1570" width="600" height="300" rx="34"/><rect class="corridorFloor" x="1500" y="1600" width="570" height="240" rx="16"/><rect x="1600" y="1640" width="400" height="18" fill="url(#hazard)"/></g>
<g id="port-thruster-chamber"><rect class="shell" x="50" y="1420" width="410" height="710" rx="48"/><rect class="floor hot" x="80" y="1450" width="350" height="650" rx="28"/><rect class="grid" x="80" y="1450" width="350" height="650" rx="28"/><ellipse cx="240" cy="1980" rx="125" ry="72" fill="#050505" stroke="#aa6733" stroke-width="22"/><path d="M150 1995L120 2085H360L330 1995Z" fill="#ff8c26" opacity=".24" filter="url(#glow)"/><rect class="panel" x="330" y="1490" width="70" height="110" rx="11"/></g>
<g id="starboard-thruster-chamber"><rect class="shell" x="2040" y="1420" width="410" height="710" rx="48"/><rect class="floor hot" x="2070" y="1450" width="350" height="650" rx="28"/><rect class="grid" x="2070" y="1450" width="350" height="650" rx="28"/><ellipse cx="2260" cy="1980" rx="125" ry="72" fill="#050505" stroke="#aa6733" stroke-width="22"/><path d="M2170 1995L2140 2085H2380L2350 1995Z" fill="#ff8c26" opacity=".24" filter="url(#glow)"/><rect class="panel" x="2100" y="1490" width="70" height="110" rx="11"/></g>

<g opacity=".9"><circle class="red" cx="175" cy="155" r="10"/><circle class="red" cx="730" cy="155" r="10"/><circle class="amber" cx="1010" cy="150" r="10"/><circle class="red" cx="1320" cy="420" r="10"/><circle class="red" cx="1570" cy="155" r="10"/><circle class="amber" cx="2140" cy="315" r="10"/><circle class="red" cx="2390" cy="145" r="10"/><circle class="blue" cx="2820" cy="390" r="10"/><circle class="red" cx="1030" cy="730" r="10"/><circle class="amber" cx="1480" cy="1320" r="10"/><circle class="red" cx="1030" cy="1530" r="10"/><circle class="red" cx="110" cy="1490" r="10"/><circle class="red" cx="2390" cy="1490" r="10"/></g>
</svg>
