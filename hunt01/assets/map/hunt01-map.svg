<svg xmlns="http://www.w3.org/2000/svg" width="2900" height="2150" viewBox="0 0 2900 2150">
<defs>
  <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1"><stop stop-color="#091018"/><stop offset="1" stop-color="#020507"/></linearGradient>
  <linearGradient id="floor" x1="0" y1="0" x2="0" y2="1"><stop stop-color="#3a4650"/><stop offset=".5" stop-color="#222c34"/><stop offset="1" stop-color="#11171c"/></linearGradient>
  <linearGradient id="hot" x1="0" y1="0" x2="0" y2="1"><stop stop-color="#43372f"/><stop offset="1" stop-color="#171615"/></linearGradient>
  <linearGradient id="cool" x1="0" y1="0" x2="1" y2="1"><stop stop-color="#183b4b"/><stop offset="1" stop-color="#0a202b"/></linearGradient>
  <linearGradient id="silver" x1="0" y1="0" x2="1" y2="1"><stop stop-color="#f4f7f9"/><stop offset=".2" stop-color="#8d9aa3"/><stop offset=".5" stop-color="#d9e0e4"/><stop offset=".8" stop-color="#65737d"/><stop offset="1" stop-color="#c9d1d6"/></linearGradient>
  <pattern id="grid" width="50" height="50" patternUnits="userSpaceOnUse"><rect width="50" height="50" fill="none" stroke="#cad6de" stroke-opacity=".14"/><circle cx="7" cy="7" r="2" fill="#dce4e9" opacity=".16"/></pattern>
  <pattern id="grate" width="28" height="28" patternUnits="userSpaceOnUse"><rect width="28" height="28" fill="#11181d"/><path d="M0 0L28 28M28 0L0 28" stroke="#71808a" stroke-width="2" opacity=".42"/></pattern>
  <pattern id="hazard" width="40" height="40" patternUnits="userSpaceOnUse" patternTransform="rotate(45)"><rect width="20" height="40" fill="#c77b24"/><rect x="20" width="20" height="40" fill="#12171b"/></pattern>
  <filter id="shadow"><feDropShadow dx="0" dy="13" stdDeviation="16" flood-color="#000" flood-opacity=".86"/></filter>
  <filter id="glow"><feGaussianBlur stdDeviation="7" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
  <style>
    .shell{fill:url(#silver);stroke:#303b43;stroke-width:8;filter:url(#shadow)}
    .floor{fill:url(#floor);stroke:#202931;stroke-width:4}.hot{fill:url(#hot)}.cool{fill:url(#cool)}
    .grid{fill:url(#grid)}.cShell{fill:url(#silver);stroke:#303b43;stroke-width:7;filter:url(#shadow)}.cFloor{fill:url(#grate)}
    .machine{fill:#141b20;stroke:#71808a;stroke-width:8}.panel{fill:#071018;stroke:#64747e;stroke-width:6}
    .blue{fill:#2bbcff;filter:url(#glow)}.red{fill:#ff3f28;filter:url(#glow)}.amber{fill:#ffad38;filter:url(#glow)}
  </style>
</defs>
<rect width="2900" height="2150" fill="url(#bg)"/>

<!-- Upper navigation chain, intentionally spaced with distinct connector halls. -->
<g id="control"><rect class="shell" x="90" y="105" width="660" height="245" rx="38"/><rect class="floor" x="120" y="135" width="600" height="185" rx="22"/><rect class="grid" x="120" y="135" width="600" height="185" rx="22"/></g>
<g><rect class="cShell" x="700" y="170" width="195" height="125" rx="18"/><rect class="cFloor" x="720" y="190" width="155" height="85" rx="10"/></g>
<g id="junction"><path class="shell" d="M925 95H1155L1235 175V345L1155 425H925L845 345V175Z"/><path class="floor" d="M950 125H1130L1205 205V315L1130 395H950L875 315V205Z"/><path class="grid" d="M950 125H1130L1205 205V315L1130 395H950L875 315V205Z"/></g>
<g><rect class="cShell" x="1185" y="170" width="210" height="125" rx="18"/><rect class="cFloor" x="1205" y="190" width="170" height="85" rx="10"/></g>
<g id="maintenance-hall"><rect class="shell" x="1345" y="105" width="620" height="245" rx="38"/><rect class="floor" x="1375" y="135" width="560" height="185" rx="22"/><rect class="grid" x="1375" y="135" width="560" height="185" rx="22"/></g>
<g><rect class="cShell" x="1915" y="170" width="205" height="125" rx="18"/><rect class="cFloor" x="1935" y="190" width="165" height="85" rx="10"/></g>
<g id="relay"><rect class="shell" x="2070" y="75" width="710" height="390" rx="42"/><rect class="floor hot" x="2100" y="105" width="650" height="330" rx="24"/><rect class="grid" x="2100" y="105" width="650" height="330" rx="24"/><rect class="machine" x="2350" y="205" width="125" height="115" rx="20"/><circle class="blue" cx="2590" cy="270" r="14"/></g>

<!-- Support wing with broad, clean doors. -->
<g><rect class="cShell" x="240" y="300" width="170" height="270" rx="20"/><rect class="cFloor" x="265" y="320" width="120" height="230" rx="12"/></g>
<g id="coolant"><rect class="shell" x="75" y="520" width="560" height="390" rx="42"/><rect class="floor cool" x="105" y="550" width="500" height="330" rx="24"/><rect class="grid" x="105" y="550" width="500" height="330" rx="24"/><path d="M165 590V840M255 580V850M535 580V850" fill="none" stroke="#526773" stroke-width="18"/><circle class="blue" cx="175" cy="835" r="13"/></g>
<g><rect class="cShell" x="580" y="630" width="200" height="150" rx="20"/><rect class="cFloor" x="605" y="655" width="150" height="100" rx="12"/></g>
<g id="storage"><rect class="shell" x="725" y="520" width="500" height="390" rx="42"/><rect class="floor" x="755" y="550" width="440" height="330" rx="24"/><rect class="grid" x="755" y="550" width="440" height="330" rx="24"/><rect class="machine" x="870" y="660" width="110" height="95" rx="18"/><rect class="panel" x="1040" y="650" width="110" height="130" rx="16"/><rect class="blue" x="1065" y="675" width="60" height="58" rx="10"/></g>
<g><rect class="cShell" x="940" y="370" width="200" height="205" rx="20"/><rect class="cFloor" x="965" y="395" width="150" height="155" rx="12"/></g>

<!-- Central route. Large empty gaps prevent visual bunching. -->
<g><rect class="cShell" x="1425" y="290" width="210" height="230" rx="22"/><rect class="cFloor" x="1450" y="300" width="160" height="200" rx="12"/></g>
<g id="tunnel"><rect class="shell" x="1295" y="470" width="470" height="670" rx="42"/><rect class="floor" x="1325" y="500" width="410" height="610" rx="24"/><rect class="grid" x="1325" y="500" width="410" height="610" rx="24"/><rect x="1365" y="550" width="330" height="16" fill="url(#hazard)"/><rect x="1365" y="1040" width="330" height="16" fill="url(#hazard)"/></g>
<g><rect class="cShell" x="1425" y="1080" width="210" height="190" rx="22"/><rect class="cFloor" x="1450" y="1110" width="160" height="130" rx="12"/></g>
<g id="engine"><rect class="shell" x="1295" y="1210" width="470" height="490" rx="42"/><rect class="floor hot" x="1325" y="1240" width="410" height="430" rx="24"/><rect class="grid" x="1325" y="1240" width="410" height="430" rx="24"/><rect class="machine" x="1465" y="1360" width="130" height="160" rx="30"/><circle class="amber" cx="1530" cy="1440" r="25"/><rect class="panel" x="1475" y="1540" width="110" height="65" rx="12"/></g>

<!-- Access corridors and thruster chambers are pushed far apart for readable traversal. -->
<g id="port-access"><rect class="cShell" x="490" y="1340" width="865" height="305" rx="34"/><rect class="cFloor" x="520" y="1370" width="805" height="245" rx="16"/><rect x="610" y="1410" width="590" height="18" fill="url(#hazard)"/></g>
<g id="starboard-access"><rect class="cShell" x="1705" y="1340" width="865" height="305" rx="34"/><rect class="cFloor" x="1735" y="1370" width="805" height="245" rx="16"/><rect x="1840" y="1410" width="590" height="18" fill="url(#hazard)"/></g>
<g><rect class="cShell" x="400" y="1395" width="140" height="195" rx="20"/><rect class="cFloor" x="430" y="1425" width="90" height="135" rx="10"/></g>
<g><rect class="cShell" x="2520" y="1395" width="140" height="195" rx="20"/><rect class="cFloor" x="2540" y="1425" width="90" height="135" rx="10"/></g>

<g id="port-thruster"><rect class="shell" x="65" y="1140" width="395" height="890" rx="46"/><rect class="floor hot" x="95" y="1170" width="335" height="830" rx="26"/><rect class="grid" x="95" y="1170" width="335" height="830" rx="26"/><rect class="machine" x="170" y="1515" width="165" height="250" rx="50"/><ellipse cx="252" cy="1825" rx="116" ry="68" fill="#050505" stroke="#a86430" stroke-width="22"/><path d="M165 1850L135 1980H370L340 1850Z" fill="#ff8c26" opacity=".25" filter="url(#glow)"/><rect class="panel" x="315" y="1235" width="75" height="115" rx="12"/></g>
<g id="starboard-thruster"><rect class="shell" x="2600" y="1140" width="395" height="890" rx="46"/><rect class="floor hot" x="2630" y="1170" width="335" height="830" rx="26"/><rect class="grid" x="2630" y="1170" width="335" height="830" rx="26"/><rect class="machine" x="2725" y="1515" width="165" height="250" rx="50"/><ellipse cx="2807" cy="1825" rx="116" ry="68" fill="#050505" stroke="#a86430" stroke-width="22"/><path d="M2720 1850L2690 1980H2925L2895 1850Z" fill="#ff8c26" opacity=".25" filter="url(#glow)"/><rect class="panel" x="2665" y="1235" width="75" height="115" rx="12"/></g>

<g opacity=".92"><circle class="red" cx="150" cy="150" r="10"/><circle class="red" cx="700" cy="150" r="10"/><circle class="amber" cx="910" cy="165" r="10"/><circle class="red" cx="1180" cy="350" r="10"/><circle class="red" cx="1395" cy="150" r="10"/><circle class="amber" cx="1910" cy="300" r="10"/><circle class="red" cx="2120" cy="145" r="10"/><circle class="blue" cx="2720" cy="390" r="10"/><circle class="red" cx="1345" cy="520" r="10"/><circle class="amber" cx="1705" cy="1080" r="10"/><circle class="red" cx="1345" cy="1260" r="10"/><circle class="red" cx="130" cy="1240" r="10"/><circle class="red" cx="2930" cy="1240" r="10"/></g>
</svg>
