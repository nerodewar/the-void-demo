<g id="port-thruster-chamber"><rect class="shell" x="65" y="900" width="355" height="720" rx="42"/><rect class="floor hot" x="95" y="930" width="300" height="650" rx="24"/><rect class="grid" x="95" y="930" width="300" height="650" rx="24"/><rect class="machine" x="155" y="1180" width="150" height="225" rx="45"/><ellipse cx="230" cy="1420" rx="105" ry="62" fill="#050505" stroke="#a86430" stroke-width="20"/><path d="M150 1440L125 1545H335L310 1440Z" fill="#ff8c26" opacity=".22" filter="url(#glow)"/><rect class="panel" x="300" y="985" width="65" height="100" rx="10"/></g>
