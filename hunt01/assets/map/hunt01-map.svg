<svg xmlns="http://www.w3.org/2000/svg" width="2400" height="1800" viewBox="0 0 2400 1800">
  <defs>
    <linearGradient id="floor" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#202831"/>
      <stop offset="0.5" stop-color="#11171d"/>
      <stop offset="1" stop-color="#080c10"/>
    </linearGradient>
    <linearGradient id="cool" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#102937"/>
      <stop offset="1" stop-color="#07131a"/>
    </linearGradient>
    <linearGradient id="engine" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#2b2118"/>
      <stop offset="1" stop-color="#0b0b0a"/>
    </linearGradient>
    <pattern id="grid" width="48" height="48" patternUnits="userSpaceOnUse">
      <rect width="48" height="48" fill="none" stroke="#4d5c66" stroke-opacity=".14"/>
      <path d="M0 24H48M24 0V48" stroke="#9fb2bf" stroke-opacity=".035"/>
      <circle cx="6" cy="6" r="2" fill="#8fa0aa" opacity=".18"/>
    </pattern>
    <pattern id="grate" width="28" height="28" patternUnits="userSpaceOnUse">
      <rect width="28" height="28" fill="#0b1014"/>
      <path d="M0 0L28 28M28 0L0 28" stroke="#34424b" stroke-width="2" opacity=".45"/>
    </pattern>
    <pattern id="hazard" width="44" height="44" patternUnits="userSpaceOnUse" patternTransform="rotate(45)">
      <rect width="22" height="44" fill="#b06b1e" opacity=".7"/>
      <rect x="22" width="22" height="44" fill="#11161a"/>
    </pattern>
    <filter id="glow"><feGaussianBlur stdDeviation="8" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
    <filter id="shadow"><feDropShadow dx="0" dy="14" stdDeviation="18" flood-color="#000" flood-opacity=".88"/></filter>
    <style>
      .room{stroke:#47535d;stroke-width:26;fill:url(#floor);filter:url(#shadow)}
      .room.cool{fill:url(#cool)} .room.hot{fill:url(#engine)}
      .inner{fill:url(#grid);stroke:#10161b;stroke-width:7}
      .corridor{fill:url(#grate);stroke:#4b5861;stroke-width:20;filter:url(#shadow)}
      .label{fill:#d7e3e9;font-family:Arial,sans-serif;font-size:34px;font-weight:800;letter-spacing:4px;text-anchor:middle}
      .small{font-size:24px;letter-spacing:3px;fill:#9eafb9}
      .pipe{fill:none;stroke:#202b32;stroke-width:20;stroke-linecap:round}
      .pipe2{fill:none;stroke:#53616b;stroke-width:5;opacity:.55}
      .lightR{fill:#ff3b24;filter:url(#glow)} .lightA{fill:#ffae39;filter:url(#glow)} .lightB{fill:#2fb9ff;filter:url(#glow)}
      .console{fill:#071018;stroke:#52626e;stroke-width:7}.screen{fill:#0a84bd;stroke:#70d9ff;stroke-width:4;filter:url(#glow)}
    </style>
  </defs>
  <rect width="2400" height="1800" fill="#010204"/>

  <!-- upper deck -->
  <g id="control-corridor"><rect class="room" x="120" y="120" width="650" height="230" rx="38"/><rect class="inner" x="146" y="146" width="598" height="178" rx="22"/><text class="label" x="445" y="250">CONTROL CORRIDOR</text></g>
  <rect class="corridor" x="750" y="190" width="85" height="90"/>
  <g id="emergency-junction"><path class="room" d="M875 110H1065L1135 180V340L1065 410H875L805 340V180Z"/><path class="inner" d="M895 140H1045L1105 200V320L1045 380H895L835 320V200Z"/><text class="label small" x="970" y="245">EMERGENCY</text><text class="label small" x="970" y="278">JUNCTION</text></g>
  <rect class="corridor" x="1120" y="190" width="70" height="90"/>
  <g id="maintenance-hall"><rect class="room" x="1180" y="120" width="610" height="230" rx="38"/><rect class="inner" x="1206" y="146" width="558" height="178" rx="22"/><text class="label" x="1485" y="250">MAINTENANCE HALL</text></g>
  <rect class="corridor" x="1780" y="190" width="70" height="90"/>
  <g id="power-relay-room"><rect class="room hot" x="1830" y="100" width="450" height="330" rx="42"/><rect class="inner" x="1856" y="126" width="398" height="278" rx="25"/><text class="label small" x="2055" y="205">POWER RELAY ROOM</text><path class="pipe" d="M1900 250H2210M1920 330H2185"/><path class="pipe2" d="M1900 250H2210M1920 330H2185"/><circle class="lightB" cx="2115" cy="320" r="12"/></g>

  <!-- left support rooms -->
  <rect class="corridor" x="275" y="340" width="105" height="120"/>
  <g id="coolant-access"><rect class="room cool" x="100" y="450" width="500" height="300" rx="42"/><rect class="inner" x="126" y="476" width="448" height="248" rx="24"/><text class="label" x="350" y="610">COOLANT ACCESS</text><path class="pipe" d="M160 520V690M230 500V710M505 500V710"/><path class="pipe2" d="M160 520V690M230 500V710M505 500V710"/><circle class="lightB" cx="180" cy="690" r="12"/></g>
  <rect class="corridor" x="590" y="555" width="70" height="90"/>
  <rect class="corridor" x="730" y="340" width="105" height="110"/>
  <g id="storage-room"><rect class="room" x="650" y="440" width="420" height="300" rx="42"/><rect class="inner" x="676" y="466" width="368" height="248" rx="24"/><text class="label small" x="815" y="525">STORAGE ROOM</text><rect class="console" x="797" y="565" width="126" height="105" rx="20"/><rect class="screen" x="822" y="580" width="76" height="55" rx="10"/><text class="label small" x="810" y="700">PLASMA RECHARGE</text></g>

  <!-- central vertical route -->
  <rect class="corridor" x="925" y="390" width="90" height="65"/>
  <g id="maintenance-tunnel"><rect class="room" x="970" y="410" width="300" height="500" rx="32"/><rect class="inner" x="996" y="436" width="248" height="448" rx="18"/><text class="label small" x="1120" y="635">MAINTENANCE</text><text class="label small" x="1120" y="670">TUNNEL</text><path d="M1015 460H1225M1015 850H1225" stroke="url(#hazard)" stroke-width="18"/></g>
  <rect class="corridor" x="1070" y="730" width="100" height="60"/>
  <g id="engine-room"><rect class="room hot" x="970" y="940" width="300" height="420" rx="32"/><rect class="inner" x="996" y="966" width="248" height="368" rx="18"/><text class="label small" x="1120" y="1050">ENGINE ROOM</text><circle cx="1120" cy="1180" r="92" fill="#101419" stroke="#6b4b2c" stroke-width="24"/><circle cx="1120" cy="1180" r="44" fill="#c46f22" opacity=".65" filter="url(#glow)"/><rect class="console" x="1052" y="1260" width="136" height="55" rx="12"/><rect class="screen" x="1076" y="1272" width="88" height="26" rx="5"/></g>

  <!-- access corridors -->
  <g id="port-engine-access"><rect class="corridor" x="600" y="1110" width="370" height="180" rx="24"/><rect x="630" y="1150" width="310" height="20" fill="url(#hazard)"/><text class="label small" x="785" y="1235">PORT ENGINE ACCESS</text></g>
  <g id="starboard-engine-access"><rect class="corridor" x="1270" y="1110" width="370" height="180" rx="24"/><rect x="1300" y="1150" width="310" height="20" fill="url(#hazard)"/><text class="label small" x="1455" y="1235">STARBOARD ENGINE ACCESS</text></g>

  <!-- thruster chambers: nozzles point south -->
  <g id="port-thruster-chamber"><rect class="room hot" x="160" y="980" width="440" height="650" rx="50"/><rect class="inner" x="186" y="1006" width="388" height="598" rx="28"/><text class="label small" x="380" y="1055">PORT THRUSTER CHAMBER</text><path class="pipe" d="M225 1100H535M225 1170H535"/><path class="pipe2" d="M225 1100H535M225 1170H535"/><g id="port-thruster"><rect x="275" y="1230" width="210" height="220" rx="60" fill="#171717" stroke="#725236" stroke-width="22"/><ellipse cx="380" cy="1435" rx="120" ry="65" fill="#050505" stroke="#b36b32" stroke-width="24"/><path d="M290 1450L260 1570H500L470 1450Z" fill="#ff8b22" opacity=".15" filter="url(#glow)"/></g><rect class="console" x="510" y="1080" width="62" height="100" rx="10"/><rect x="524" y="1096" width="34" height="45" fill="#ff5b2f" filter="url(#glow)"/></g>
  <g id="starboard-thruster-chamber"><rect class="room hot" x="1640" y="980" width="440" height="650" rx="50"/><rect class="inner" x="1666" y="1006" width="388" height="598" rx="28"/><text class="label small" x="1860" y="1055">STARBOARD THRUSTER CHAMBER</text><path class="pipe" d="M1705 1100H2015M1705 1170H2015"/><path class="pipe2" d="M1705 1100H2015M1705 1170H2015"/><g id="starboard-thruster"><rect x="1755" y="1230" width="210" height="220" rx="60" fill="#171717" stroke="#725236" stroke-width="22"/><ellipse cx="1860" cy="1435" rx="120" ry="65" fill="#050505" stroke="#b36b32" stroke-width="24"/><path d="M1770 1450L1740 1570H1980L1950 1450Z" fill="#ff8b22" opacity=".15" filter="url(#glow)"/></g><rect class="console" x="1642" y="1080" width="62" height="100" rx="10"/><rect x="1656" y="1096" width="34" height="45" fill="#ff5b2f" filter="url(#glow)"/></g>

  <!-- repeating alert lamps -->
  <g opacity=".9"><circle class="lightR" cx="165" cy="150" r="9"/><circle class="lightR" cx="720" cy="150" r="9"/><circle class="lightA" cx="845" cy="170" r="9"/><circle class="lightR" cx="1085" cy="340" r="9"/><circle class="lightR" cx="1220" cy="150" r="9"/><circle class="lightA" cx="1740" cy="310" r="9"/><circle class="lightR" cx="1010" cy="450" r="9"/><circle class="lightA" cx="1230" cy="860" r="9"/><circle class="lightR" cx="1010" cy="1000" r="9"/><circle class="lightA" cx="1228" cy="1305" r="9"/><circle class="lightR" cx="205" cy="1015" r="9"/><circle class="lightR" cx="2035" cy="1015" r="9"/></g>
</svg>
