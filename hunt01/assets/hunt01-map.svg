<svg xmlns="http://www.w3.org/2000/svg" width="2400" height="1800" viewBox="0 0 2400 1800">
<defs>
  <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1"><stop stop-color="#080d12"/><stop offset="1" stop-color="#020507"/></linearGradient>
  <linearGradient id="floor" x1="0" y1="0" x2="0" y2="1"><stop stop-color="#35414a"/><stop offset=".55" stop-color="#202931"/><stop offset="1" stop-color="#11171c"/></linearGradient>
  <linearGradient id="hot" x1="0" y1="0" x2="0" y2="1"><stop stop-color="#40352d"/><stop offset="1" stop-color="#171615"/></linearGradient>
  <linearGradient id="cool" x1="0" y1="0" x2="1" y2="1"><stop stop-color="#173746"/><stop offset="1" stop-color="#0a202b"/></linearGradient>
  <linearGradient id="silver" x1="0" y1="0" x2="1" y2="1"><stop stop-color="#eef4f7"/><stop offset=".18" stop-color="#8c9aa3"/><stop offset=".5" stop-color="#d5dde1"/><stop offset=".78" stop-color="#65737d"/><stop offset="1" stop-color="#c4cdd2"/></linearGradient>
  <pattern id="grid" width="44" height="44" patternUnits="userSpaceOnUse"><rect width="44" height="44" fill="none" stroke="#c6d2da" stroke-opacity=".16"/><circle cx="6" cy="6" r="2" fill="#d7e0e5" opacity=".16"/></pattern>
  <pattern id="grate" width="26" height="26" patternUnits="userSpaceOnUse"><rect width="26" height="26" fill="#11181d"/><path d="M0 0L26 26M26 0L0 26" stroke="#6f7e88" stroke-width="2" opacity=".44"/></pattern>
  <pattern id="hazard" width="36" height="36" patternUnits="userSpaceOnUse" patternTransform="rotate(45)"><rect width="18" height="36" fill="#c47a24"/><rect x="18" width="18" height="36" fill="#12171b"/></pattern>
  <filter id="shadow"><feDropShadow dx="0" dy="12" stdDeviation="15" flood-color="#000" flood-opacity=".85"/></filter>
  <filter id="glow"><feGaussianBlur stdDeviation="7" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
  <style>
    .shell{fill:url(#silver);stroke:#303b43;stroke-width:8;filter:url(#shadow)}
    .floor{fill:url(#floor);stroke:#202931;stroke-width:4}.floor.hot{fill:url(#hot)}.floor.cool{fill:url(#cool)}
    .grid{fill:url(#grid)}.corridorShell{fill:url(#silver);stroke:#303b43;stroke-width:7;filter:url(#shadow)}.corridorFloor{fill:url(#grate)}
    .machine{fill:#141b20;stroke:#71808a;stroke-width:8}.panel{fill:#071018;stroke:#64747e;stroke-width:6}.blue{fill:#2bbcff;filter:url(#glow)}.red{fill:#ff3f28;filter:url(#glow)}.amber{fill:#ffad38;filter:url(#glow)}
  </style>
</defs>
<rect width="2400" height="1800" fill="url(#bg)"/>

<!-- Every room has its own footprint. Connectors touch at doors but never sit beneath another room. -->
<g id="control-corridor"><rect class="shell" x="120" y="120" width="625" height="220" rx="34"/><rect class="floor" x="145" y="145" width="575" height="170" rx="20"/><rect class="grid" x="145" y="145" width="575" height="170" rx="20"/></g>
<g><rect class="corridorShell" x="710" y="175" width="110" height="110" rx="16"/><rect class="corridorFloor" x="720" y="190" width="90" height="80"/></g>
<g id="emergency-junction"><path class="shell" d="M850 120H1040L1105 185V335L1040 400H850L785 335V185Z"/><path class="floor" d="M870 145H1020L1080 205V315L1020 375H870L810 315V205Z"/><path class="grid" d="M870 145H1020L1080 205V315L1020 375H870L810 315V205Z"/></g>
<g><rect class="corridorShell" x="1070" y="175" width="110" height="110" rx="16"/><rect class="corridorFloor" x="1080" y="190" width="90" height="80"/></g>
